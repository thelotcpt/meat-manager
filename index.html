<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juanita's Meat Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .admin-only { display: none; }
        body.is-admin .admin-only { display: block; }
        body.is-admin .customer-only { display: none; }
        .step-inactive { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-32" id="app-body">
    <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 p-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tighter italic text-red-600">MEAT MANAGER PRO</h1>
                <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">v2.2 • Secret Build</p>
            </div>
            <button onclick="toggleAdmin()" class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400 hover:text-red-600 transition shadow-inner">
                <i class="fa-solid fa-user-gear text-sm"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-6">
        <!-- ADMIN VIEW -->
        <section class="admin-only space-y-4">
            <div class="bg-slate-900 text-white p-8 rounded-[2rem] shadow-2xl overflow-hidden relative">
                <div class="relative z-10">
                    <h2 class="text-3xl font-black mb-1">Admin Panel</h2>
                    <p class="text-slate-400 text-[10px] uppercase font-bold tracking-[0.2em] mb-6">Juanita De Jager Business</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                <h3 class="font-black text-xs text-slate-400 uppercase tracking-widest mb-4 px-2">Inventory Management</h3>
                <div id="admin-catalog" class="space-y-3"></div>
            </div>
        </section>

        <!-- CUSTOMER FLOW -->
        <div class="customer-only space-y-6">
            <!-- STEP 1: WELCOME DATA CAPTURE -->
            <div id="welcome-step" class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 text-center space-y-8">
                <div class="w-24 h-24 bg-red-600 text-white rounded-[2rem] flex items-center justify-center mx-auto shadow-2xl rotate-3">
                    <i class="fa-solid fa-drumstick-bite text-4xl"></i>
                </div>
                <div>
                    <h2 class="text-3xl font-black tracking-tighter leading-none text-slate-900">Elite Quality Meats<br>Direct to You.</h2>
                    <p class="text-slate-500 mt-4 text-sm font-medium px-4">Private portal for residents. Enter details to view prices.</p>
                </div>
                <div class="space-y-3">
                    <input type="text" id="cust-name" placeholder="Full Name" class="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-red-500 focus:bg-white outline-none transition font-bold text-lg">
                    <input type="tel" id="cust-phone" placeholder="WhatsApp Number" class="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-red-500 focus:bg-white outline-none transition font-bold text-lg">
                    <textarea id="cust-addr" placeholder="Delivery Address" class="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-red-500 focus:bg-white outline-none transition font-bold text-lg h-24 resize-none"></textarea>
                    
                    <div class="flex gap-2">
                        <button onclick="setAddressType('Home')" id="btn-home" class="flex-1 py-4 bg-red-50 border-2 border-red-200 rounded-2xl text-[10px] font-black transition tracking-widest text-red-600">🏠 HOME</button>
                        <button onclick="setAddressType('Office')" id="btn-office" class="flex-1 py-4 bg-slate-50 border-2 border-transparent rounded-2xl text-[10px] font-black transition tracking-widest text-slate-400">🏢 OFFICE</button>
                    </div>

                    <button onclick="unlockCatalog()" class="w-full bg-red-600 text-white font-black py-5 rounded-2xl shadow-2xl shadow-red-200 uppercase tracking-[0.2em] text-sm hover:scale-[1.02] active:scale-95 transition mt-4">Browse Catalog</button>
                </div>
            </div>

            <!-- STEP 2: INTERACTIVE CATALOG -->
            <section id="catalog-step" class="step-inactive space-y-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="font-black text-2xl tracking-tighter italic text-slate-900">LIVE MENU</h2>
                    <div class="flex items-center gap-1.5 bg-green-100 text-green-700 px-3 py-1 rounded-full">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-[10px] font-black uppercase tracking-widest">In Stock</span>
                    </div>
                </div>
                <div id="customer-catalog" class="space-y-4"></div>
            </section>
        </div>
    </main>

    <!-- FLOATING CHECKOUT -->
    <div id="checkout-bar" class="step-inactive fixed bottom-6 left-4 right-4 z-50 animate-in slide-in-from-bottom duration-500">
        <div class="max-w-md mx-auto bg-slate-900 text-white p-5 rounded-[2.5rem] shadow-2xl flex items-center justify-between ring-8 ring-white">
            <div class="pl-4">
                <p class="text-[10px] uppercase font-black text-slate-500 tracking-widest">Grand Total</p>
                <p class="text-3xl font-black text-red-500" id="total-val">R 0</p>
            </div>
            <button onclick="sendOrder()" class="bg-red-600 px-8 py-5 rounded-[2rem] font-black text-xs uppercase tracking-widest hover:bg-red-700 transition active:scale-95 shadow-xl shadow-red-900/40">
                Confirm Order <i class="fa-solid fa-chevron-right ml-2"></i>
            </button>
        </div>
    </div>

    <script>
        const catalog = [
            {id: 1, name: "Italian Pasta Roll", price: 185, img: "pasta_rolls.jpg", note: "Handmade. Select flavors below.", isPasta: true, 
             flavors: ["Bolognese", "Moroccan Chicken", "Mexican Mince", "Mince Stroganoff", "Butter Chicken", "Chicken Mushroom", "Alfredo", "Spinach Feta", "Butternut Feta"]},
            {id: 10, name: "Assorted Biscuits (Tub 1 - 1.2kg)", price: 150, img: "biscuits.jpg", note: "Subject to availability"},
            {id: 11, name: "Assorted Biscuits (Tub 2 - 1.2kg)", price: 150, img: "biscuits.jpg", note: "Subject to availability"},
            {id: 12, name: "Hake Crumbed Fingers (4kg Box)", price: 280, img: "hake_fingers.jpg", note: "Subject to availability"},
            {id: 13, name: "Hake Box (10kg Bulk)", price: 950, img: "hake_fingers.jpg", note: "Subject to availability"},
            {id: 14, name: "Chicken Schnitzels (Large)", price: 265, img: "🍗", note: "Subject to availability"},
            {id: 15, name: "Smoked Viennas (1kg)", price: 85, img: "🌭", note: "Subject to availability"},
            {id: 16, name: "Beef Patties (Home Style)", price: 145, img: "🍔", note: "Subject to availability"},
            {id: 17, name: "Lamb Chops (1kg)", price: 185, img: "🥩", note: "Subject to availability"},
            {id: 18, name: "Pork Belly Ribs (10-11kg Box)", price: 1000, img: "ribs.jpg", note: "Special this week! Available 12 June"},
            {id: 19, name: "Fresh Large Snoek", price: 150, img: "snoek.jpg", note: "Last catch for the week!"},
            {id: 20, name: "Chicken Goulash (±3kg)", price: 185, img: "chicken_goulash.jpg", note: "Order for Saturday."}
        ];

        let cart = {};
        let addrType = "Home";
        let isAdmin = false;

        function setAddressType(type) {
            addrType = type;
            document.getElementById('btn-home').className = type === 'Home' ? "flex-1 py-4 bg-red-50 border-2 border-red-200 rounded-2xl text-[10px] font-black tracking-widest text-red-600 transition" : "flex-1 py-4 bg-slate-50 border-2 border-transparent rounded-2xl text-[10px] font-black tracking-widest text-slate-400 transition";
            document.getElementById('btn-office').className = type === 'Office' ? "flex-1 py-4 bg-red-50 border-2 border-red-200 rounded-2xl text-[10px] font-black tracking-widest text-red-600 transition" : "flex-1 py-4 bg-slate-50 border-2 border-transparent rounded-2xl text-[10px] font-black tracking-widest text-slate-400 transition";
        }

        function unlockCatalog() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const addr = document.getElementById('cust-addr').value;
            if(!name || !phone || !addr) return alert("Please complete your details!");
            document.getElementById('welcome-step').classList.add('step-inactive');
            document.getElementById('catalog-step').classList.remove('step-inactive');
            document.getElementById('checkout-bar').classList.remove('step-inactive');
            renderCustomerCatalog();
        }

        function renderCustomerCatalog() {
            const container = document.getElementById('customer-catalog');
            container.innerHTML = catalog.map(item => {
                if (item.isPasta) {
                    return `
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-4">
                            <div class="flex items-center gap-5">
                                <div class="w-24 h-24 bg-slate-50 rounded-3xl flex items-center justify-center text-4xl overflow-hidden border-2 border-white shadow-inner">
                                    <img src="${item.img}" class="w-full h-full object-cover">
                                </div>
                                <div class="flex-1">
                                    <p class="font-black text-slate-800 leading-tight text-lg">${item.name}</p>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase mt-0.5">${item.note}</p>
                                    <p class="text-sm font-black text-red-600 mt-1 uppercase tracking-widest">R ${item.price}</p>
                                </div>
                            </div>
                            <div class="space-y-2 pt-2 border-t border-slate-50">
                                ${item.flavors.map(flavor => `
                                    <div class="flex items-center justify-between bg-slate-50 p-3 rounded-2xl">
                                        <span class="font-bold text-xs text-slate-600">${flavor}</span>
                                        <div class="flex items-center gap-3">
                                            <button onclick="updateFlavorQty('${flavor}', -1)" class="bg-white w-8 h-8 rounded-lg shadow-sm font-black text-sm">-</button>
                                            <span class="font-black text-sm w-4 text-center">${cart['pasta_' + flavor] || 0}</span>
                                            <button onclick="updateFlavorQty('${flavor}', 1)" class="bg-white w-8 h-8 rounded-lg shadow-sm font-black text-sm">+</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
                return `
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 flex items-center justify-between">
                    <div class="flex items-center gap-5">
                        <div class="w-24 h-24 bg-slate-50 rounded-3xl flex items-center justify-center text-4xl overflow-hidden border-2 border-white shadow-inner">
                            <img src="${item.img.includes('.') ? item.img : ''}" class="${item.img.includes('.') ? '' : 'hidden'} w-full h-full object-cover">
                            <span class="${item.img.includes('.') ? 'hidden' : ''}">${item.img}</span>
                        </div>
                        <div class="flex-1">
                            <p class="font-black text-slate-800 leading-tight">${item.name}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mt-0.5">${item.note || ""}</p>
                            <p class="text-sm font-black text-red-600 mt-1 uppercase tracking-widest">R ${item.price}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 bg-slate-50 p-2 rounded-2xl shadow-inner">
                        <button onclick="updateQty(${item.id}, -1)" class="bg-white w-10 h-10 rounded-xl shadow-md font-black text-lg">-</button>
                        <span class="font-black text-lg w-6 text-center">${cart[item.id] || 0}</span>
                        <button onclick="updateQty(${item.id}, 1)" class="bg-white w-10 h-10 rounded-xl shadow-md font-black text-lg">+</button>
                    </div>
                </div>
            `;}).join('');
        }

        function updateFlavorQty(flavor, delta) {
            const key = 'pasta_' + flavor;
            cart[key] = Math.max(0, (cart[key] || 0) + delta);
            renderCustomerCatalog();
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            catalog.forEach(i => {
                if (i.isPasta) {
                    i.flavors.forEach(f => {
                        total += (i.price * (cart['pasta_' + f] || 0));
                    });
                } else {
                    total += (i.price * (cart[i.id] || 0));
                }
            });
            document.getElementById('total-val').innerText = "R " + total;
        }

        function sendOrder() {
            const name = document.getElementById('cust-name').value;
            const addr = document.getElementById('cust-addr').value;
            const total = document.getElementById('total-val').innerText;
            let items = [];
            catalog.forEach(i => {
                if (i.isPasta) {
                    i.flavors.forEach(f => {
                        if (cart['pasta_' + f] > 0) items.push(`${cart['pasta_' + f]}x Italian Pasta Roll (${f})`);
                    });
                } else {
                    if (cart[i.id] > 0) items.push(`${cart[i.id]}x ${i.name}`);
                }
            });
            if(items.length === 0) return alert("Select some items first!");
            const message = `🍖 *NEW MEAT ORDER*\n\n*From:* ${name}\n*Delivery:* ${addr} (${addrType})\n\n*Items:*\n${items.join('\n')}\n\n*TOTAL: ${total}*`;
            window.location.href = `https://wa.me/27723714859?text=${encodeURIComponent(message)}`;
        }
    </script>
</body>
</html>
